<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>

      body{
        font-family: Arial;
        background-color: var(--theme-user-selection-bg);
        margin-top: 0px;
        margin-bottom: 0px;
      }

      .class-button {
        background-color: rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .class-button:hover {
        background-color: rgb(20, 110, 68);
      }

      .class-input {
        padding: 12px 15px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container {
        display: flex;
        padding: 15px;
        background-color: white;
        border-top: 1px solid #e0e0e0;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: flex-end;
        align-items: flex-start;
      }

      .chat-message-robot{
        display: flex;
        justify-content: flex-start;
        align-items: flex-start;
      }

      .chat-message-text{
        background-color: rgb(238, 238, 238);
        font-family: Arial;
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
        word-wrap: break-word;
      }

      .chat-message-user .chat-message-text {
        background-color: rgb(0, 132, 255);
        color: white;
      }

      .chat-message-profile{
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
      }

      .chat-message-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow-y: auto;
        overflow-x: hidden;
        padding: 0 10px;
        scrollbar-width: thin;
        scrollbar-color: rgba(0, 0, 0, 0.2) transparent;
      }

      .chat-message-container::-webkit-scrollbar {
        width: 6px;
      }

      .chat-message-container::-webkit-scrollbar-track {
        background: transparent;
      }

      .chat-message-container::-webkit-scrollbar-thumb {
        background: rgba(0, 0, 0, 0.2);
        border-radius: 3px;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <script src="https://unpkg.com/supersimpledev/babel.js"></script>

    <script type="text/babel">
      function ChatInput({ chatMessages, setChatMessages }) {
        const [inputText, setInputText] = React.useState('');
        const [isLoading, setIsLoading] = React.useState(false);

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        async function sendMessage() {
          if (isLoading || inputText.trim() === '') {
            return;
          }

          setIsLoading(true);
          setInputText('');

          const newChatMessages = [
            ...chatMessages,
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ];

          setChatMessages([
            ...newChatMessages,
            {
              message: 'Loading...',
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);

          try {
  let response;

  try {
    // First try your custom API
    const apiResponse = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: inputText
      })
    });

    if (apiResponse.ok) {
      const data = await apiResponse.json();
      response = data.reply;
    } else {
      throw new Error("API failed");
    }

  } catch (err) {
    console.log("Using fallback chatbot");
    
    // Fallback to SuperSimpleDev chatbot
    response = await Chatbot.getResponseAsync(inputText);
  }

  setChatMessages([
    ...newChatMessages,
    {
      message: response,
      sender: "robot",
      id: crypto.randomUUID()
    }
  ]);

} catch (error) {
  console.error(error);

  setChatMessages([
    ...newChatMessages,
    {
      message: "Sorry, something went wrong.",
      sender: "robot",
      id: crypto.randomUUID()
    }
  ]);
}
        }

        function handleKeyDown(event) {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          } else if (event.key === 'Escape') {
            setInputText('');
          }
        }

        return (
          <div className="chat-input-container">
            <input
              placeholder="Send a message to Chatbot"
              size="30"
              onChange={saveInputText}
              onKeyDown={handleKeyDown}
              value={inputText}
              className="class-input"
              disabled={isLoading}
            />
            <button
              onClick={sendMessage}
              className="class-button"
              disabled={isLoading}
            >
              {isLoading ? 'Sending...' : 'Send'}
            </button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        return (
          <div className={
            sender === 'user'
              ? 'chat-message-user'
              : 'chat-message-robot'
          }>
            {sender === 'robot' && (
              <img 
                src="robot.png" 
                className="chat-message-profile"
                alt="Robot"
                onError={(e) => {
                  e.target.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect fill="%23888" width="100" height="100"/%3E%3Ctext x="50" y="50" font-size="40" fill="white" text-anchor="middle" dy=".3em"%3E🤖%3C/text%3E%3C/svg%3E';
                }}
              />
            )}
            <div className="chat-message-text">
              {message}
            </div>
            {sender === 'user' && (
              <img 
                src="user.png" 
                className="chat-message-profile"
                alt="User"
                onError={(e) => {
                  e.target.src = 'data:image/svg+xml,%3Csvg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"%3E%3Crect fill="%23007AFF" width="100" height="100"/%3E%3Ctext x="50" y="50" font-size="40" fill="white" text-anchor="middle" dy=".3em"%3E👤%3C/text%3E%3C/svg%3E';
                }}
              />
            )}
          </div>
        );
      }

      function ChatMessages({ chatMessages }) {
        const chatMessageRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessageRef.current;
          if (containerElem) {
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div 
            className="chat-message-container"
            ref={chatMessageRef}
          >
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        const [chatMessages, setChatMessages] = React.useState([
          {
            message: 'hello chatbot',
            sender: 'user',
            id: 'id1'
          },
          {
            message: 'Hello! How can I help you?',
            sender: 'robot',
            id: 'id2'
          },
          {
            message: 'can you get me todays date?',
            sender: 'user',
            id: 'id3'
          },
          {
            message: 'Today is September 27',
            sender: 'robot',
            id: 'id4'
          }
        ]);

        return (
          <div className="app-container">
            <ChatMessages
              chatMessages={chatMessages}
            />
            <ChatInput
              chatMessages={chatMessages}
              setChatMessages={setChatMessages}
            />
          </div>
        );
      }

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
